services:
  postgres:
    image: postgres:16-alpine
    container_name: wsbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wsbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:-wsbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wsbot} -d ${POSTGRES_DB:-wsbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wsbot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: whatsapp-stock-bot:latest
    container_name: wsbot-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wsbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wsbot}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_ENV: production
      DEBUG: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  celery-worker:
    image: whatsapp-stock-bot:latest
    container_name: wsbot-celery-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app:celery_app worker --queues=fetch,deliver --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wsbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wsbot}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  celery-beat:
    image: whatsapp-stock-bot:latest
    container_name: wsbot-celery-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app:celery_app beat --loglevel=info -s /tmp/celerybeat-schedule
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-wsbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-wsbot}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      APP_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # Optional: Celery monitoring (disable if not needed)
  flower:
    image: whatsapp-stock-bot:latest
    container_name: wsbot-flower
    restart: unless-stopped
    command: celery -A app.workers.celery_app:celery_app flower --port=5555
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      FLOWER_BASIC_AUTH: ${FLOWER_AUTH:-}
    depends_on:
      - redis
      - celery-worker
    profiles:
      - flower

volumes:
  postgres_data:
  redis_data:
